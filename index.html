<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mousy's AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>

<div class="app-container">
    <div class="overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="brand-glyph">✦</span>
            Mousy's AI
        </div>

        <div class="nav-section">
            <button class="btn-primary" id="newChatBtn">
                <i data-lucide="plus"></i> New Chat
            </button>
        </div>

        <div class="history-list" id="historyList"></div>

        <div class="nav-section sidebar-footer">
            <button class="nav-item" id="openSettingsBtn">
                <i data-lucide="settings"></i> Settings
            </button>
        </div>
    </aside>

    <main class="main-stage" id="mainStage">
        <div class="view active" id="chatView">
            <header class="header-bar">
                <button class="action-btn" id="menuToggle">
                    <i data-lucide="menu"></i>
                </button>
                <div class="model-picker-wrap">
                    <select id="modelSelect" class="top-model-select">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-3.5-turbo">GPT-3.5</option>
                    </select>
                </div>
                <div style="width:40px;"></div>
            </header>

            <div class="chat-scroll" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-orb">
                        <div class="orb-ring"></div>
                        <div class="orb-ring orb-ring-2"></div>
                        <div class="orb-core">✦</div>
                    </div>
                    <div class="empty-title">Mousy's AI</div>
                    <div class="empty-sub">Ask anything. Your key is saved locally.</div>
                </div>
            </div>

            <div class="input-anchor">
                <div class="input-shell" id="inputShell">
                    <textarea id="chatInput" placeholder="Type your command..." rows="1"></textarea>
                    <button class="action-btn send" id="sendBtn">
                        <i data-lucide="arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="view" id="settingsView">
            <header class="header-bar">
                <button class="action-btn" id="backToChat">
                    <i data-lucide="chevron-left"></i>
                </button>
                <div class="view-title">Settings</div>
                <div style="width:40px;"></div>
            </header>

            <div class="settings-content">

                <div class="setting-card" id="keyCard">
                    <div class="setting-card-label">
                        <i data-lucide="key"></i>
                        <span>OpenAI API Key</span>
                        <span class="key-badge" id="keyBadge"></span>
                    </div>
                    <div class="key-input-row">
                        <div class="key-field-wrap">
                            <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
                            <button class="icon-toggle" id="toggleKeyBtn" title="Show/hide key">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                        <button class="btn-save-key" id="saveApiKeyBtn">
                            <i data-lucide="save"></i>
                            Save Key
                        </button>
                    </div>
                    <p class="setting-sub" id="keyHint">Your key is stored in localStorage on this device only.</p>
                </div>

                <div class="setting-card">
                    <div class="setting-card-label">
                        <i data-lucide="cpu"></i>
                        <span>Memory</span>
                    </div>
                    <textarea id="systemPromptInput" class="system-textarea" placeholder="Describe how the AI should behave..." rows="4"></textarea>
                    <button class="btn-save-prompt" id="saveSystemPromptBtn">
                        <i data-lucide="check"></i>
                        Save Prompt
                    </button>
                </div>

                <div class="setting-card setting-card-danger">
                    <div class="setting-card-label">
                        <i data-lucide="alert-triangle"></i>
                        <span>Danger Zone</span>
                    </div>
                    <button class="btn-danger" id="wipeMemoryBtn">
                        <i data-lucide="trash-2"></i> Wipe All Memory
                    </button>
                </div>

            </div>
        </div>
    </main>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>
<script src="main.js"></script>
</body>
</html>
